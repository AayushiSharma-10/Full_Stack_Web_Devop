<!DOCTYPE html> 
<html> 
<head> 
    <title>Hotel Customer Profile</title> 
</head> 
<body> 
 
<h2>Hotel Customer Profile Form</h2> 
 
<form>   
    Name: 
    <input type="text" name="name"> 
    <br><br> 
 
    Address: 
    <br> 
    <textarea name="address" rows="4" cols="30"></textarea> 
    <br><br> 
 
    Age: 
    <input type="number" name="age"> 
    <br><br> 
 
    Gender: 
    <input type="radio" name="gender"> Male 
    <input type="radio" name="gender"> Female 
    <br><br> 
 
    Room Type: 
    <input type="radio" name="room"> A/C 
    <input type="radio" name="room"> Non A/C 
    <input type="radio" name="room"> Deluxe 
    <br><br> 
 
    Payment Type: 
    <input type="radio" name="payment"> Cash 
    <input type="radio" name="payment"> Credit/Debit Card 
    <input type="radio" name="payment"> Coupons 
    <br><br> 
 
    <input type="submit" value="Submit"> 
 
</form> 
</body> 
</html>
