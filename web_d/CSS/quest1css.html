<!DOCTYPE html> 
<html> 
<head> 
<title>Hyperlink Styling</title> 
<style> 
a:link { 
color: pink; 
text-decoration: none; 
} 
a:visited { 
color: green; 
text-decoration: none; 
} 
a:active { 
color: blue; 
text-decoration: none; 
} 
</style> 
</head> 
<body> 
<a href="https://www.google.com/">Google</a><br><br> 
<a href="https://www.wikipedia.org/">Wikipedia</a><br><br> 
<a href="https://www.amazon.in/">Amazon</a> 
</body> 
</html>
