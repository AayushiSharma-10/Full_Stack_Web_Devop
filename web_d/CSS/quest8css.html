<!DOCTYPE html> 
<html> 
<head> 
    <title>CSS Position Properties</title> 
    <style> 
        body { 
            height: 1500px; 
            font-family: Arial; 
        } 
 
        .box { 
            width: 200px; 
            height: 80px; 
            margin: 20px; 
            padding: 10px; 
            color: white; 
        } 
        .static { 
            position: static; 
            background-color: gray; 
        } 
        .relative { 
            position: relative; 
            top: 20px; 
            left: 20px; 
            background-color: blue; 
        } 
        .container { 
            position: relative; 
            height: 200px; 
            border: 2px dashed black; 
            margin: 20px; 
        } 
 
        .absolute { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background-color: green; 
        } 
        .fixed { 
            position: fixed; 
            bottom: 10px; 
            right: 10px; 
            background-color: red; 
        } 
.sticky { 
position: sticky; 
top: 0; 
background-color: purple; 
} 
</style> 
</head> 
<body> 
<div class="box static">Static Position</div> 
<div class="box relative">Relative Position</div> 
<div class="container"> 
<div class="box absolute">Absolute Position</div> 
</div> 
<div class="box sticky">Sticky Position (Scroll)</div> 
<div class="box fixed">Fixed Position</div> 
<p>Scroll down to see fixed and sticky effects.</p> 
</body> 
</html>
